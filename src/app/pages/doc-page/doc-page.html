<div id="page">
    <app-top-nav-component></app-top-nav-component>
    <div id="content">
        <side-bar-component></side-bar-component>
        <div id="list">
            <div id="parent">
                <div id="Documents">Documents</div>
                <select id="cars" name="cars">
                    <option value="Recent">Recent</option>
                    <option value="Size">Size</option>
                    <option value="Type">Type</option>
                </select>
            </div>
            <div id="list2">
                @for (doc of documents; track doc.id) {
                    <div class="component">
                        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text-icon lucide-file-text"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
                        <div id="info">
                            <div>{{doc.name}}</div>
                            <div>{{doc.size}} KB • {{doc.date | date}}</div>
                        </div>
                        <div id="buttons">
                            <button id="bt1">Download</button>
                            <button id="bt2">Delete</button>
                        </div>
                    </div>
                }
            </div>
        </div>
        <div id="information">
            <div id="title">{{selectedPdf?.name}}</div>
            <div id="descrip">PDF • {{selectedPdf?.size}} KB • Uploaded {{selectedPdf?.date | date}}</div>
            <div id="space">
                <div>Preview</div>
                <div id="space2">
                    @if (selectedPdf) {
                        <iframe [src]="selectedPdf.url | safeUrl" width="100%" height="100%"></iframe>
                    } @else {
                        <div id="empty">No document selected</div>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
